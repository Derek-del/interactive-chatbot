<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Conversational Canvas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        /* --- GLOBAL STYLES --- */
        :root {
            --bg-color: #0f172a;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bot-bubble: rgba(255, 255, 255, 0.1);
            --user-bubble: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- OPENING ANIMATION --- */
        .loader-orb {
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            position: absolute;
            animation: pulse 1.5s infinite alternate, explode 1s 1.5s forwards;
            z-index: 10;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px var(--primary); }
            100% { transform: scale(1.5); box-shadow: 0 0 30px var(--primary); }
        }

        @keyframes explode {
            0% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(200); opacity: 0; visibility: hidden; }
        }

        /* --- CHAT CONTAINER (Glassmorphism) --- */
        .chat-container {
            width: 90%;
            max-width: 500px;
            height: 80vh;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(50px);
            animation: slideUpFade 1s 2s forwards cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 20;
            overflow: hidden;
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .chat-history {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-history::-webkit-scrollbar { width: 6px; }
        .chat-history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* --- MESSAGES --- */
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            opacity: 0;
            animation: popIn 0.4s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        .message.bot {
            background: var(--bot-bubble);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.user {
            background: var(--user-bubble);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- OPTIONS AREA --- */
        .options-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 160px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            text-align: left;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: translateY(10px);
        }

        .option-btn.show {
            opacity: 1;
            transform: translateY(0);
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateX(5px) scale(1.02);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* --- TYPING INDICATOR --- */
        .typing {
            display: none;
            align-items: center;
            gap: 4px;
            padding: 12px 18px;
            background: var(--bot-bubble);
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            width: fit-content;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typeBounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typeBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

    </style>
</head>
<body>

    <div class="loader-orb"></div>

    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            Interactive Assistant
        </div>
        
        <div class="chat-history" id="chatHistory">
            <div class="typing" id="typingIndicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div class="options-container" id="optionsContainer">
            </div>
    </div>

    <script>
        // --- 1. Define Your Pre-set Questions and Answers ---
        const qaData = [
            { id: 1, q: "What services do you offer?", a: "We specialize in crafting premium, highly interactive websites with immersive animations." },
            { id: 2, q: "How much does a project cost?", a: "Every project is unique! Our packages typically start at $2,500, but we tailor everything to your specific needs." },
            { id: 3, q: "Can I see your portfolio?", a: "Absolutely! Once we finish chatting, I can redirect you to our interactive gallery." },
            { id: 4, q: "How long does a build take?", a: "A standard interactive website takes about 4 to 6 weeks from design to launch." }
        ];

        // --- 2. Element Selectors ---
        const chatHistory = document.getElementById('chatHistory');
        const optionsContainer = document.getElementById('optionsContainer');
        const typingIndicator = document.getElementById('typingIndicator');

        // --- 3. Core Functions ---

        // Start the sequence after the CSS loader finishes (approx 2.5 seconds)
        setTimeout(() => {
            addMessage("Hi there! Welcome to the Conversational Canvas. How can I help you today?", "bot");
            setTimeout(() => renderOptions(qaData), 600);
        }, 2800);

        // Add a message to the screen
        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.innerText = text;
            
            // Insert before typing indicator to keep it at the bottom
            chatHistory.insertBefore(msgDiv, typingIndicator);
            scrollToBottom();
        }

        // Render the clickable question buttons with a staggered animation
        function renderOptions(options) {
            optionsContainer.innerHTML = ''; // Clear old options
            
            options.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.classList.add('option-btn');
                btn.innerText = item.q;
                
                // Add click event
                btn.onclick = () => handleQuestionSelect(item);
                
                optionsContainer.appendChild(btn);

                // Staggered entrance animation
                setTimeout(() => {
                    btn.classList.add('show');
                }, index * 100); 
            });
        }

        // Handle when a user clicks a question
        function handleQuestionSelect(item) {
            // 1. Clear options immediately to prevent double-clicking
            optionsContainer.innerHTML = '';

            // 2. Show the user's selected question as a message
            addMessage(item.q, "user");

            // 3. Show typing indicator to simulate thinking
            typingIndicator.style.display = "flex";
            scrollToBottom();

            // 4. After a slight delay, show the answer
            setTimeout(() => {
                typingIndicator.style.display = "none";
                addMessage(item.a, "bot");

                // 5. Provide a way to ask another question
                setTimeout(() => {
                    renderAskAnother();
                }, 800);

            }, 1200); // 1.2 seconds of "typing"
        }

        // Render a "refresh" button to get the list back
        function renderAskAnother() {
            optionsContainer.innerHTML = '';
            const btn = document.createElement('button');
            btn.classList.add('option-btn');
            btn.style.textAlign = "center";
            btn.style.borderColor = "var(--primary)";
            btn.innerText = "↻ Ask something else";
            
            btn.onclick = () => {
                optionsContainer.innerHTML = '';
                renderOptions(qaData);
            };
            
            optionsContainer.appendChild(btn);
            setTimeout(() => btn.classList.add('show'), 50);
        }

        // Keep chat scrolled to bottom
        function scrollToBottom() {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>
</body>
</html>
